<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Love ❤️</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #10131a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
    }
    #passwordGate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    #passwordGate input {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
      text-align: center;
      width: 240px;
    }
    #passwordGate button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #e0245e;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    #passwordGate button:hover {
      background: #c31d4f;
    }
    #passwordError {
      color: #ff6b6b;
      font-size: 14px;
      min-height: 18px;
    }
  </style>
</head>

<body>

<div id="passwordGate">
  <h2><i class="bi bi-lock-heart-fill"></i> This page is just for you ❤️</h2>
  <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
  <button onclick="checkPassword()">Unlock</button>
  <div id="passwordError"></div>
</div>

<script>
  const CORRECT_PASSWORD = "jadeANDviolet";

  function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    const error = document.getElementById("passwordError");

    if (input === CORRECT_PASSWORD) {
      window.location.href = "loading.html";
    } else {
      error.textContent = "Oops, wrong password. Try again ❤️";
    }
  }

  document.getElementById("passwordInput").addEventListener("keyup", function (e) {
    if (e.key === "Enter") {
      checkPassword();
    }
  });
</script>

</body>
</html>
