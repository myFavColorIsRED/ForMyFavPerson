<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      background:#ffc0cb;
      overflow:hidden;
    }

    .card{
      background:#fff;
      width:700px;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 20px rgba(0,0,0,.2);
      text-align:center;
    }

    .gif-container{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
    }

    h1{
      color:#ff4d6d;
      font-size:40px;
      margin:20px 0;
    }

    .buttons{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:20px;
      margin-top:20px;
      height:60px;
    }

    button{
      padding:12px 30px;
      border:none;
      border-radius:30px;
      font-size:20px;
      cursor:pointer;
      transition:.3s;
    }

    .yes-btn{
      background:#ff4d6d;
      color:#fff;
    }

    .yes-btn:hover{
      background:#ff1f4d;
    }

    .no-btn{
      background:#d9d9d9;
      color:#000;
    }

    #message{
      margin-top:20px;
      color:#ff4d6d;
      font-size:22px;
      font-weight:bold;
    }
  </style>

</head>
<body>

<div class="card">

  <div class="gif-container">
    <div class="tenor-gif-embed"
         data-postid="17266900336609124174"
         data-share-method="host"
         data-aspect-ratio="1.07519"
         data-width="35%">
    </div>
  </div>

  <h1>Gusto mo ba maging part ng buhay ko? ❤️</h1>

  <div class="buttons">
    <button class="yes-btn" onclick="yesClick()">Yes ❤️</button>
    <button class="no-btn" id="noBtn">No 💔</button>
  </div>

  <p id="message"></p>

</div>

<script async src="https://tenor.com/embed.js"></script>

<script>
  const noBtn = document.getElementById("noBtn");

  function moveButton() {
    noBtn.style.position = "fixed";

    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }

  noBtn.addEventListener("mouseenter", moveButton);
  noBtn.addEventListener("click", moveButton);

  function yesClick() {
    window.location.href = "iloveyou.html";
  }
</script>

</body>
</html>
