<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title><!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff6b81,#ff9a9e);
      color:white;
      font-family:Poppins,sans-serif;
      overflow:hidden;
    }

    .heart{
      font-size:90px;
      animation:beat 1s infinite;
    }

    @keyframes beat{
      0%{transform:scale(1);}
      25%{transform:scale(1.3);}
      50%{transform:scale(1);}
      75%{transform:scale(1.3);}
      100%{transform:scale(1);}
    }

    .progress{
      width:250px;
      margin-top:20px;
    }

  </style>
</head>

<body>

<div class="text-center">

  <div class="heart">❤️</div>

  <h4 class="mt-3">Get ready hehehehhe</h4>

  <div class="progress">
    <div id="bar" class="progress-bar bg-danger progress-bar-striped progress-bar-animated" style="width:0%"></div>
  </div>

</div>

<script>
  let bar = document.getElementById("bar");
  let width = 0;

  let load = setInterval(() => {
    width += 2;
    bar.style.width = width + "%";

    if(width >= 100){
      clearInterval(load);

      setTimeout(() => {
        window.location.href = "question.html";
      }, 500);
    }
  }, 30);
</script>

</body>
</html>
